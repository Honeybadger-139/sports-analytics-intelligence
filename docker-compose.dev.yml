# ============================================================
# docker-compose.dev.yml — Development overrides
# ============================================================
# Extends docker-compose.base.yml with:
#   - pgAdmin for SQL exploration
#   - Grafana for dashboard development
#   - Backend hot-reload (already set in Dockerfile CMD --reload)
#   - ChromaDB vector store (optional, commented out by default)
#
# Usage:
#   docker-compose -f docker-compose.base.yml -f docker-compose.dev.yml up
# ============================================================

services:
  backend:
    environment:
      LANGFUSE_ENABLED: "false"
      CHAT_ENGINE: ${CHAT_ENGINE:-legacy}
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app   # live code sync for hot-reload

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sports-analytics-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sportsanalytics.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin2026}
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:latest
    container_name: sports-analytics-grafana
    restart: unless-stopped
    ports:
      - "3301:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro

  # ChromaDB Vector Store (uncomment to run locally instead of using embedded mode)
  # chromadb:
  #   image: chromadb/chroma:latest
  #   container_name: sports-analytics-vectordb
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - chroma_data:/chroma/chroma

volumes:
  pgadmin_data:
  grafana_data:
  # chroma_data:
