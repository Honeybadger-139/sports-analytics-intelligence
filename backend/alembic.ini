# Alembic Configuration File
# ----------------------------------------------------------
# Wave 3: Alembic is now the schema authority for this project.
# Run migrations via:   alembic upgrade head
# Create new revision:  alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic

# Template used for new revision files
file_template = %%(rev)s_%%(slug)s

# Path to migration versions directory
version_locations = %(here)s/alembic/versions

# Connection string (overridden by env.py from DATABASE_URL env var)
sqlalchemy.url = postgresql://analyst:analytics2026@localhost:5432/sports_analytics

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
